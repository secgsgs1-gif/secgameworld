name: K-Stock Sync

on:
  workflow_dispatch:
  schedule:
    # Weekdays 09:03-14:53 KST => 00:03-05:53 UTC, every 10 minutes
    - cron: "3,13,23,33,43,53 0-5 * * 1-5"
    # Weekdays 15:03-15:23 KST => 06:03-06:23 UTC, every 10 minutes
    - cron: "3,13,23 6 * * 1-5"
    # Weekdays 15:43 KST => 06:43 UTC, final post-close snapshot
    - cron: "43 6 * * 1-5"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: kstock-sync
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Sync stock market cache
        env:
          FIREBASE_SERVICE_ACCOUNT_PATH: ${{ runner.temp }}/firebase-service-account.json
        run: npm run sync:kstock
